<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StageFlow ADMIN - Mon Profil</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/admin/admin-profil.html" class="btn-account"></a>
    </nav>

    <div class="container" style="max-width: 800px; min-height: 60vh">
      <h1 style="margin-bottom: 2rem">
        <i class="fa-solid fa-shield-halved" style="color: #6b2424"></i>
        Sécurité & Profil
      </h1>

      <div class="admin-panel">
        <h2>Mes informations</h2>
        <form id="form-profil" class="profil-form">
          <div style="display: flex; gap: 1.5rem">
            <div class="form-group" style="flex: 1">
              <label>Nom</label>
              <input type="text" id="profil-nom" class="form-control" />
            </div>
            <div class="form-group" style="flex: 1">
              <label>Prénom</label>
              <input type="text" id="profil-prenom" class="form-control" />
            </div>
          </div>
          <div class="form-group">
            <label>Adresse Email de connexion</label>
            <input type="email" id="profil-email" class="form-control" />
          </div>
          <div
            id="msg-profil"
            style="margin-bottom: 1rem; font-weight: 500; font-size: 0.9rem"
          ></div>
          <button
            type="submit"
            class="btn-submit"
            style="background-color: #111"
          >
            Sauvegarder les modifications
          </button>
        </form>
      </div>

      <div class="admin-panel">
        <h2>Changer le mot de passe</h2>
        <form id="form-mdp">
          <div class="form-group">
            <label>Mot de passe actuel</label>
            <input
              type="password"
              id="ancien-mdp"
              class="form-control"
              placeholder="Entrez votre mot de passe actuel"
              required
            />
          </div>
          <div class="form-group">
            <label>Nouveau mot de passe</label>
            <input
              type="password"
              id="nouveau-mdp"
              class="form-control"
              placeholder="Entrez un nouveau mot de passe fort"
              required
              minlength="6"
            />
          </div>
          <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input
              type="password"
              id="confirm-mdp"
              class="form-control"
              placeholder="Retapez le mot de passe"
              required
              minlength="6"
            />
          </div>

          <div
            id="msg-mdp"
            style="margin-bottom: 1rem; font-weight: 500; font-size: 0.9rem"
          ></div>

          <button
            type="submit"
            class="btn-submit"
            style="background-color: #111"
          >
            Mettre à jour le mot de passe
          </button>
        </form>
      </div>

      <div style="text-align: center; margin-top: 3rem">
        <a
          href="/api/logout"
          class="btn-deconnexion"
          style="font-size: 1.1rem; padding: 1rem 2rem"
        >
          <i class="fa-solid fa-right-from-bracket"></i> Fermer la session
          sécurisée
        </a>
      </div>
    </div>

    <footer id="footer-dynamique"></footer>

    <script src="/script.js"></script>
  </body>
</html>
