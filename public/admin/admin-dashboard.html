<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StageFlow ADMIN - Tableau de bord</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="admin.css" />

    <style></style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/admin/admin-profil.html" class="btn-account"></a>
    </nav>

    <div class="container" style="min-height: 60vh">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          margin-bottom: 2rem;
        "
      >
        <div>
          <h1 style="font-size: 1.8rem">Tableau de bord</h1>
          <p style="color: #666">Vue d'ensemble de la plateforme StageFlow.</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Étudiants inscrits</h3>
          <div class="number">142</div>
        </div>
        <div class="stat-card">
          <h3>Entreprises actives</h3>
          <div class="number">38</div>
        </div>
        <div class="stat-card">
          <h3>Offres en ligne</h3>
          <div class="number">85</div>
        </div>
        <div class="stat-card" style="border-top-color: #f44336">
          <h3 style="color: #f44336">Signalements</h3>
          <div class="number">3</div>
        </div>
      </div>

      <h2 style="font-size: 1.2rem; margin-bottom: 1rem">Actions rapides</h2>
      <div class="admin-actions">
        <a href="/admin/utilisateurs.html" class="btn-admin-action">
          <i class="fa-solid fa-users"></i>
          Gérer les utilisateurs
        </a>
        <a href="/admin/offres.html" class="btn-admin-action">
          <i class="fa-solid fa-briefcase"></i>
          Modérer les offres
        </a>
        <a href="/admin/historique-bans.html" class="btn-admin-action">
          <i class="fa-solid fa-gavel"></i>
          Historique des bans
        </a>
      </div>
    </div>

    <footer id="footer-dynamique"></footer>

    <script src="/script.js"></script>
  </body>
</html>
