<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StageFlow ADMIN - Historique des bans</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="../index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/admin/admin-profil.html" class="btn-account"></a>
    </nav>

    <div class="container" style="min-height: 60vh">
      <div style="margin-bottom: 2rem">
        <h1 style="font-size: 1.8rem">
          <i class="fa-solid fa-gavel" style="color: #6b2424"></i> Historique
          des bannissements
        </h1>
        <p style="color: #666">
          Consultez la liste des utilisateurs exclus de la plateforme.
        </p>
      </div>

      <table class="admin-table data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Utilisateur / Entreprise</th>
            <th>Type</th>
            <th>Motif</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-bans-body">
          <tr>
            <td colspan="6" style="text-align: center; padding: 2rem">
              <i class="fa-solid fa-spinner fa-spin"></i> Chargement de
              l'historique...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer id="footer-dynamique"></footer>

    <script src="../script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
