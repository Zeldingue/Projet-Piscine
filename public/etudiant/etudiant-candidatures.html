<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>StageFlow - Mes Candidatures</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="etudiant.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <!-- LA NAVBAR COMMUNE -->
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>

      <!-- C'est ici que le JS va injecter les 3 liens -->
      <ul class="nav-links"></ul>

      <!-- C'est ici que le JS va injecter "Franc 👤" -->
      <a href="/etudiant/etudiant-profil.html" class="btn-account"> </a>
    </nav>
    <div class="container">
      <h1 style="margin-bottom: 2rem">Suivi de mes candidatures</h1>
      <table class="data-table">
        <thead>
          <tr>
            <th>Entreprise</th>
            <th>Poste</th>
            <th>Date d'envoi</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="candidatures-body">
          <tr>
            <td colspan="5" style="text-align: center; padding: 2rem">
              <i class="fa-solid fa-spinner fa-spin"></i> Chargement de vos
              candidatures...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- FOOTER DYNAMIQUE -->
    <footer id="footer-dynamique" class="site-footer"></footer>
    <script src="../script.js"></script>
    <script src="etudiant.js"></script>
  </body>
</html>
