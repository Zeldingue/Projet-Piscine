<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>StageFlow - Mon Carnet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="etudiant.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/etudiant/etudiant-profil.html" class="btn-account"> </a>
    </nav>

    <div class="container">
      <div class="header-flex">
        <div>
          <h1>Mon Carnet de Stages</h1>
          <p style="color: #666">Historique de tes expériences validées.</p>
        </div>
        <button
          class="ajouter-stage-btn"
          onclick="ouvrirModalStage()"
          style="border: none; cursor: pointer; font-size: 1rem"
        >
          <i class="fa-solid fa-plus"></i>
          <p>Ajouter un stage</p>
        </button>
      </div>

      <div
        id="carnet-container"
        style="
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
          margin-top: 2rem;
        "
      >
        <div style="text-align: center; padding: 3rem; color: #666">
          <i class="fa-solid fa-spinner fa-spin"></i> Chargement de votre
          carnet...
        </div>
      </div>

      <div id="modal-ajouter-stage" class="modal-overlay">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="titre-modal-stage">Ajouter une expérience</h2>
            <button class="btn-close-modal" onclick="fermerModalStage()">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <div class="modal-body">
            <p class="modal-subtitle">
              Renseignez les informations de votre stage validé
            </p>

            <form id="form-ajouter-stage">
              <input type="hidden" id="edit-id-stage" value="" />

              <div class="form-group">
                <label>Entreprise *</label>
                <select
                  id="select-entreprise"
                  class="form-control"
                  required
                  onchange="toggleAutreEntreprise()"
                >
                  <option value="">Chargement des entreprises...</option>
                </select>
              </div>

              <div
                class="form-group"
                id="bloc-autre-entreprise"
                style="display: none"
              >
                <label>Nom de la nouvelle entreprise *</label>
                <input
                  type="text"
                  id="ajout-entreprise-manuel"
                  class="form-control"
                  placeholder="Ex: TechCorp Solutions"
                />
              </div>

              <div class="form-group">
                <label>Poste occupé / Mission *</label>
                <input
                  type="text"
                  id="ajout-mission"
                  class="form-control"
                  placeholder="Ex: Développeur Back-End Node.js"
                  required
                />
              </div>

              <div class="row" style="display: flex; gap: 1rem">
                <div class="col form-group" style="flex: 1">
                  <label>Date de début *</label>
                  <input
                    type="date"
                    id="ajout-debut"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col form-group" style="flex: 1">
                  <label>Date de fin *</label>
                  <input
                    type="date"
                    id="ajout-fin"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label>Tuteur de stage (Nom & Prénom)</label>
                <input
                  type="text"
                  id="ajout-tuteur"
                  class="form-control"
                  placeholder="Ex: Bernard Leroy"
                />
              </div>

              <hr
                style="
                  border: 0;
                  border-top: 1px solid #eaeaea;
                  margin: 1.5rem 0;
                "
              />

              <div
                id="msg-ajout"
                style="
                  margin-bottom: 1rem;
                  font-weight: 500;
                  font-size: 0.9rem;
                  text-align: center;
                "
              ></div>

              <div class="modal-actions">
                <button type="submit" id="btn-submit-stage" class="btn-submit">
                  Enregistrer le stage
                </button>
                <button
                  type="button"
                  class="btn-cancel-modal"
                  onclick="fermerModalStage()"
                >
                  Annuler
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer id="footer-dynamique" class="site-footer"></footer>

    <script src="../script.js"></script>
    <script src="etudiant.js"></script>
  </body>
</html>
