<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Nouvelle Offre - StageFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="entreprise.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <!-- NAVBAR DYNAMIQUE (Identique sur tout le site) -->
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>

      <!-- C'est ici que le JS va injecter les liens de l'entreprise -->
      <ul class="nav-links"></ul>

      <!-- C'est ici que le JS va injecter "Nom Entreprise 🏢" -->
      <a href="/entreprise/entreprise-profil.html" class="btn-account"> </a>
    </nav>
    <div class="form-container">
      <h1
        style="
          margin-bottom: 2rem;
          border-bottom: 1px solid #eee;
          padding-bottom: 1rem;
        "
      >
        Publier une offre de stage
      </h1>
      <form id="form-nouvelle-offre" class="form-nouvelle-offre">
        <div class="form-group">
          <label>Titre de la mission *</label>
          <input
            type="text"
            class="form-control"
            placeholder="Ex: Développeur Web Front-End (H/F)"
            required
            id="titre"
          />
        </div>
        <div class="row">
          <div class="col form-group">
            <label>Date de début *</label
            ><input type="date" class="form-control" id="date-debut" required />
          </div>
          <div class="col form-group">
            <label>Date de fin *</label
            ><input type="date" class="form-control" id="date-fin" required />
          </div>
        </div>
        <div class="form-group">
          <label>Nom du tuteur</label
          ><input
            type="text"
            class="form-control"
            placeholder="Ex: Jean Dupont"
            id="tuteur"
          />
        </div>
        <div class="form-group">
          <label>Description de la mission *</label>
          <textarea
            class="form-control"
            placeholder="Décrivez les tâches..."
            required
            id="mission"
          ></textarea>
        </div>
        <div
          id="msg-ajout"
          style="
            margin-bottom: 1rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
          "
        ></div>
        <button type="submit" class="btn-submit">Publier l'offre</button>
        <a href="entreprise-dashboard.html" class="btn-cancel">Annuler</a>
      </form>
    </div>
    <!-- FOOTER DYNAMIQUE -->
    <footer id="footer-dynamique" class="site-footer"></footer>
    <script src="../script.js"></script>
    <script src="entreprise.js"></script>
  </body>
</html>
