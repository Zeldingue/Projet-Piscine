<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Candidatures - Espace Entreprise</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="entreprise.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/entreprise/entreprise-profil.html" class="btn-account"></a>
    </nav>

    <div class="container">
      <div class="header-info" style="margin-bottom: 2rem">
        <div id="header-offre-id" style="color: #586b33; font-weight: 600">
          Chargement...
        </div>
        <h2 id="header-offre-titre">Recherche des candidatures...</h2>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>Candidat</th>
            <th>Formation</th>
            <th>Date</th>
            <th>CV / Lettre</th>
            <th>Statut</th>
            <th>Décision</th>
          </tr>
        </thead>
        <tbody id="table-candidatures-body">
          <tr>
            <td colspan="6" style="text-align: center; padding: 2rem">
              <i class="fa-solid fa-spinner fa-spin"></i> Récupération des
              données...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div id="modal-lettre" class="modal-overlay" style="display: none">
      <div class="modal-content" style="max-width: 600px">
        <div class="modal-header">
          <h2>Lettre de motivation</h2>
          <button
            class="btn-close-modal"
            onclick="fermerModalLettre()"
            style="
              background: none;
              border: none;
              font-size: 1.5rem;
              cursor: pointer;
            "
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <p
            id="contenu-lettre"
            style="
              white-space: pre-wrap;
              line-height: 1.6;
              color: #444;
              padding: 1rem;
              background: #f9f9f9;
              border-radius: 8px;
              border: 1px solid #eaeaea;
            "
          ></p>
        </div>
      </div>
    </div>

    <footer id="footer-dynamique" class="site-footer"></footer>

    <script src="../script.js"></script>
    <script src="entreprise.js"></script>
  </body>
</html>
