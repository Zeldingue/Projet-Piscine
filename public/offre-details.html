<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail de l'offre - StageFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="etudiant/etudiant.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/index.html" class="logo">StageFlow</a>
      <ul class="nav-links"></ul>
      <a href="/connexion.html" class="btn-account"></a>
    </nav>

    <div class="container">
      <div
        id="loading-message"
        style="text-align: center; padding: 5rem; width: 100%"
      >
        <i class="fa-solid fa-spinner fa-spin"></i> Chargement de l'offre...
      </div>

      <div
        id="offre-container"
        style="display: none; width: 100%; display: flex; gap: 3rem"
      >
        <div class="main-content" style="flex: 2">
          <div
            class="company-name"
            id="detail-entreprise"
            style="
              color: #586b33;
              font-weight: bold;
              text-transform: uppercase;
              margin-bottom: 0.5rem;
            "
          ></div>
          <h1
            class="job-title"
            id="detail-titre"
            style="
              font-family: &quot;Lora&quot;, serif;
              font-size: 2.5rem;
              margin-bottom: 2rem;
            "
          ></h1>

          <div class="description">
            <h3
              style="
                margin-bottom: 1rem;
                border-bottom: 1px solid #eaeaea;
                padding-bottom: 0.5rem;
              "
            >
              La mission
            </h3>
            <p
              id="detail-mission"
              style="line-height: 1.8; color: #444; white-space: pre-line"
            ></p>
          </div>
        </div>

        <div class="sidebar" style="flex: 1">
          <div
            class="sidebar-card"
            style="
              background: white;
              padding: 2rem;
              border-radius: 12px;
              border: 1px solid #eaeaea;
              position: sticky;
              top: 2rem;
            "
          >
            <button class="btn-postuler" onclick="ouvrirModal()">
              Postuler maintenant
            </button>

            <div style="text-align: center; margin-top: 1.5rem">
              <a
                href="#"
                onclick="
                  ouvrirModalSignalement();
                  return false;
                "
                style="
                  color: #888;
                  font-size: 0.9rem;
                  text-decoration: underline;
                "
              >
                <i class="fa-solid fa-flag" style="color: #dc3545"></i> Signaler
                cette offre
              </a>
            </div>

            <ul
              class="info-list"
              style="
                list-style: none;
                padding: 0;
                line-height: 2.2;
                color: #555;
              "
            >
              <li>
                <i
                  class="fa-solid fa-location-dot"
                  style="color: #586b33; width: 20px"
                ></i>
                <strong>Lieu :</strong> <span id="detail-ville"></span>
              </li>
              <li>
                <i
                  class="fa-regular fa-calendar"
                  style="color: #586b33; width: 20px"
                ></i>
                <strong>Dates :</strong> <span id="detail-dates"></span>
              </li>
              <li>
                <i
                  class="fa-solid fa-user-tie"
                  style="color: #586b33; width: 20px"
                ></i>
                <strong>Tuteur :</strong> <span id="detail-tuteur"></span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div id="modal-postuler" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Postuler à cette offre</h2>
          <button class="btn-close-modal" onclick="fermerModal()">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="modal-body">
          <p
            class="modal-subtitle"
            id="modal-offre-titre"
            style="color: #586b33; font-weight: 600; margin-bottom: 1.5rem"
          ></p>

          <form id="form-candidature">
            <input type="hidden" id="candidature-id-offre" value="" />

            <div class="form-group">
              <label>Curriculum Vitae (CV) *</label>
              <div class="custom-file-upload">
                <input
                  type="file"
                  id="cv-upload"
                  class="hidden-input"
                  accept=".pdf,.doc,.docx"
                  required
                  onchange="updateFileName(this)"
                />
                <label for="cv-upload" class="upload-zone" id="upload-zone">
                  <i
                    class="fa-solid fa-cloud-arrow-up upload-icon"
                    id="upload-icon"
                  ></i>
                  <span class="upload-text" id="upload-text"
                    >Cliquez pour ajouter votre CV</span
                  ><br />
                  <span
                    class="upload-hint"
                    style="font-size: 0.8rem; color: #888"
                    >Format PDF recommandé. Max 5Mo.</span
                  >
                </label>
              </div>
            </div>

            <div class="form-group">
              <label>Lettre de motivation *</label>
              <textarea
                id="lettre-motivation"
                class="form-control"
                placeholder="Rédigez votre lettre ici..."
                required
                style="min-height: 120px"
              ></textarea>
            </div>

            <div
              id="msg-candidature"
              style="text-align: center; font-weight: bold; margin-top: 1rem"
            ></div>

            <div
              class="modal-actions"
              style="margin-top: 2rem; display: flex; gap: 1rem"
            >
              <button type="submit" class="btn-submit" style="flex: 2">
                Envoyer la candidature
              </button>
              <button
                type="button"
                class="btn-cancel-modal"
                onclick="fermerModal()"
                style="flex: 1"
              >
                Annuler
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="modal-signalement" class="modal-overlay" style="display: none">
      <div class="modal-content" style="max-width: 500px">
        <div class="modal-header">
          <h2>Signaler une offre</h2>
          <button class="btn-close-modal" onclick="fermerModalSignalement()">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="modal-body">
          <p style="color: #666; margin-bottom: 1.5rem; font-size: 0.9rem">
            Aidez-nous à maintenir la qualité de StageFlow. Pourquoi
            signalez-vous cette offre ?
          </p>

          <form id="form-signalement">
            <div class="form-group">
              <label>Motif du signalement *</label>
              <select id="signalement-motif" class="form-control" required>
                <option value="">Sélectionnez un motif...</option>
                <option value="Offre pourvue">L'offre est déjà pourvue</option>
                <option value="Arnaque / Fausse offre">
                  Arnaque / Fausse offre
                </option>
                <option value="Contenu inapproprié">Contenu inapproprié</option>
                <option value="Erreur dans la description">
                  Erreur importante dans la description
                </option>
                <option value="Autre">Autre</option>
              </select>
            </div>

            <div class="form-group">
              <label>Détails supplémentaires</label>
              <textarea
                id="signalement-description"
                class="form-control"
                placeholder="Précisez votre signalement..."
                style="min-height: 100px"
              ></textarea>
            </div>

            <div
              id="msg-signalement"
              style="text-align: center; font-weight: bold; margin-bottom: 1rem"
            ></div>

            <div class="modal-actions" style="display: flex; gap: 1rem">
              <button
                type="submit"
                class="btn-submit"
                style="background-color: #dc3545; flex: 2"
              >
                Envoyer le signalement
              </button>
              <button
                type="button"
                class="btn-cancel-modal"
                onclick="fermerModalSignalement()"
                style="
                  flex: 1;
                  padding: 1rem;
                  border: 1px solid #ddd;
                  background: white;
                  border-radius: 8px;
                  cursor: pointer;
                "
              >
                Annuler
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer id="footer-dynamique"></footer>
    <script src="/script.js"></script>
    <script src="etudiant/etudiant.js"></script>
  </body>
</html>
